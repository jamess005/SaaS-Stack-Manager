name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest pytest-cov flask python-dotenv

      - name: Run tests
        run: pytest
        env:
          AGENT_DRY_RUN: "true"
